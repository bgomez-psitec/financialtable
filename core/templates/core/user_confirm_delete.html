{% extends "core/base.html" %}

{% block title %}Eliminar usuario{% endblock %}

{% block heading %}Eliminar usuario{% endblock %}

{% block content %}
  <p class="mdc-typography--body1">
    ¿Seguro que quieres eliminar a <strong>{{ user.username }}</strong>?
  </p>
  <div class="form-actions">
    <form method="post">
      {% csrf_token %}
      <button class="mdc-button mdc-button--raised danger" type="submit">
        <span class="mdc-button__label">Eliminar</span>
      </button>
    </form>
    <a class="text-link" href="{% url 'users' %}">Cancelar</a>
  </div>
{% endblock %}
