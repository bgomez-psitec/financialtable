<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard</title>
    <style>
      :root {
        --bg: #f4f6f8;
        --card: #ffffff;
        --ink: #1f2933;
        --muted: #5b6770;
        --accent: #0e4d92;
        --accent-2: #0a2f4f;
        --line: #d7dee6;
        --shadow: 0 12px 40px rgba(15, 23, 42, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        color: var(--ink);
        background: radial-gradient(circle at top, #f7fafc, #eef2f6 60%, #e6ecf2);
        min-height: 100vh;
        padding: 32px;
      }

      .shell {
        max-width: 980px;
        margin: 0 auto;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0;
        font-size: 26px;
      }

      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 18px;
      }

      .card {
        background: var(--card);
        border-radius: 16px;
        padding: 18px;
        box-shadow: var(--shadow);
        border: 1px solid rgba(255, 255, 255, 0.7);
      }

      .card h3 {
        margin: 0 0 8px;
        font-size: 16px;
      }

      .card p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header>
        <div>
          <div class="meta">Panel financiero</div>
          <h1>Dashboard</h1>
        </div>
        <form method="post" action="{% url 'logout' %}">
          {% csrf_token %}
          <button class="logout" type="submit">Salir</button>
        </form>
      </header>
      <section class="card-grid">
        <div class="card">
          <h3>Ingresos</h3>
          <p>Resumen mensual</p>
        </div>
        <div class="card">
          <h3>Gastos</h3>
          <p>Comparativo trimestral</p>
        </div>
        <div class="card">
          <h3>Flujo de caja</h3>
          <p>Últimos 30 días</p>
        </div>
      </section>
    </div>
    <style>
      .logout {
        padding: 10px 14px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: #ffffff;
        color: var(--accent-2);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </body>
</html>
