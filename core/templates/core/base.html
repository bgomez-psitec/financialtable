{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'core/styles.css' %}" />
    {% block extra_head %}{% endblock %}
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">DC</div>
          <div>
            <div class="meta">Home</div>
            <h1>Dashboard</h1>
          </div>
        </div>
        <nav class="nav">
          <a class="nav-link {% if active_page == 'dashboard' %}active{% endif %}" href="{% url 'dashboard' %}">Dashboard</a>
          {% if request.user.is_staff %}
            <a class="nav-link {% if active_page == 'users' %}active{% endif %}" href="{% url 'users' %}">Usuarios</a>
          {% endif %}
          <form class="logout-form" method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button class="nav-link logout" type="submit">Log out</button>
          </form>
        </nav>
      </aside>
      <main class="content">
        <header class="content-header">
          <h2>{% block heading %}{% endblock %}</h2>
        </header>
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
