<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Acceso</title>
    <style>
      :root {
        --bg: #f4f6f8;
        --card: #ffffff;
        --ink: #1f2933;
        --muted: #5b6770;
        --accent: #0e4d92;
        --accent-2: #0a2f4f;
        --line: #d7dee6;
        --shadow: 0 12px 40px rgba(15, 23, 42, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        color: var(--ink);
        background: radial-gradient(circle at top, #f7fafc, #eef2f6 60%, #e6ecf2);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px;
      }

      .login-shell {
        width: 100%;
        max-width: 460px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 18px;
      }

      .brand-mark {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        display: grid;
        place-items: center;
        color: #fff;
        font-weight: 700;
        letter-spacing: 0.5px;
      }

      .brand h1 {
        font-size: 20px;
        margin: 0;
      }

      .card {
        background: var(--card);
        border-radius: 18px;
        padding: 28px;
        box-shadow: var(--shadow);
        border: 1px solid rgba(255, 255, 255, 0.7);
      }

      .card h2 {
        margin: 0 0 8px;
        font-size: 22px;
      }

      .card p {
        margin: 0 0 20px;
        color: var(--muted);
      }

      form {
        display: grid;
        gap: 14px;
      }

      label {
        font-size: 13px;
        color: var(--muted);
        display: block;
        margin-bottom: 6px;
      }

      input {
        width: 100%;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: #f9fbfd;
        font-size: 15px;
        outline: none;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(14, 77, 146, 0.15);
      }

      .button {
        width: 100%;
        padding: 12px 16px;
        border-radius: 12px;
        border: none;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: white;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .button:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 20px rgba(14, 77, 146, 0.2);
      }

      .meta {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: var(--muted);
      }

      .error {
        background: #fdecec;
        color: #8a1f1f;
        border: 1px solid #f7c9c9;
        padding: 10px 12px;
        border-radius: 12px;
        font-size: 13px;
      }

      .success {
        background: #e6f4ea;
        color: #1a5e33;
        border: 1px solid #b9e0c3;
        padding: 10px 12px;
        border-radius: 12px;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="login-shell">
      <div class="brand">
        <div class="brand-mark">DC</div>
        <div>
          <h1>DataContaBL</h1>
          <div class="meta">Acceso seguro a tu panel financiero</div>
        </div>
      </div>
      <div class="card">
        <h2>Iniciar sesión</h2>
        <p>Ingresa con tu usuario de Django para continuar.</p>

        {% if error %}
          <div class="error">{{ error }}</div>
        {% endif %}

        {% if already_logged_in %}
          <div class="success">Ya has iniciado sesión.</div>
        {% endif %}

        <form method="post" novalidate>
          {% csrf_token %}
          <div>
            <label for="username">Usuario</label>
            <input id="username" name="username" type="text" autocomplete="username" required />
          </div>
          <div>
            <label for="password">Contraseña</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required />
          </div>
          <button class="button" type="submit">Entrar</button>
        </form>
      </div>
    </div>
  </body>
</html>
