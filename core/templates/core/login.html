{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Acceso</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
    <link rel="stylesheet" href="https://unpkg.com/material-components-web@latest/dist/material-components-web.min.css" />
    <link rel="stylesheet" href="{% static 'core/styles.css' %}" />
  </head>
  <body class="mdc-typography login">
    <div class="login-shell">
      <div class="login-card mdc-elevation--z2">
        <div class="brand">
          <div class="brand-mark">DC</div>
          <div>
            <div class="brand-title">DataContaBL</div>
            <div class="mdc-typography--caption">Acceso seguro a tu panel financiero</div>
          </div>
        </div>

        <h2>Iniciar sesión</h2>
        <p>Ingresa con tu usuario de Django para continuar.</p>

        {% if error %}
          <div class="error">{{ error }}</div>
        {% endif %}

        {% if already_logged_in %}
          <div class="mdc-typography--body2">Ya has iniciado sesión.</div>
        {% endif %}

        <form method="post" novalidate class="form-grid">
          {% csrf_token %}
          <label class="mdc-text-field mdc-text-field--outlined" data-mdc-auto-init="MDCTextField">
            <input class="mdc-text-field__input" id="username" name="username" type="text" autocomplete="username" required />
            <span class="mdc-notched-outline">
              <span class="mdc-notched-outline__leading"></span>
              <span class="mdc-notched-outline__notch">
                <span class="mdc-floating-label" id="username-label">Usuario</span>
              </span>
              <span class="mdc-notched-outline__trailing"></span>
            </span>
          </label>
          <label class="mdc-text-field mdc-text-field--outlined" data-mdc-auto-init="MDCTextField">
            <input class="mdc-text-field__input" id="password" name="password" type="password" autocomplete="current-password" required />
            <span class="mdc-notched-outline">
              <span class="mdc-notched-outline__leading"></span>
              <span class="mdc-notched-outline__notch">
                <span class="mdc-floating-label" id="password-label">Contraseña</span>
              </span>
              <span class="mdc-notched-outline__trailing"></span>
            </span>
          </label>
          <button class="mdc-button mdc-button--raised" type="submit">
            <span class="mdc-button__label">Entrar</span>
          </button>
        </form>
      </div>
    </div>

    <script src="https://unpkg.com/material-components-web@latest/dist/material-components-web.min.js"></script>
    <script>
      mdc.autoInit();
    </script>
  </body>
</html>
