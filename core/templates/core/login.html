{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Acceso — DataContaBL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="{% static 'core/styles.css' %}" />
  </head>
  <body class="dc-login-body">

    <div class="dc-login-card">

      <div class="dc-login-header">
        <div class="dc-login-logo">Data<span>Conta</span>BL</div>
        <div class="dc-login-sub">Gestión de inversiones</div>
      </div>

      <div class="dc-login-body-inner">

        {% if error %}
          <div class="dc-alert dc-alert--danger">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span>{{ error }}</span>
          </div>
        {% endif %}

        <form method="post" novalidate>
          {% csrf_token %}

          <div class="dc-login-field">
            <label for="username">Usuario</label>
            <div class="dc-input-wrap">
              <i class="fa-solid fa-user"></i>
              <input
                id="username"
                name="username"
                type="text"
                autocomplete="username"
                placeholder="nombre de usuario"
                required
              />
            </div>
          </div>

          <div class="dc-login-field">
            <label for="password">Contraseña</label>
            <div class="dc-input-wrap">
              <i class="fa-solid fa-lock"></i>
              <input
                id="password"
                name="password"
                type="password"
                autocomplete="current-password"
                placeholder="••••••••"
                required
              />
            </div>
          </div>

          <button type="submit" class="dc-login-btn">Entrar</button>
        </form>

        <div style="text-align:center;margin-top:14px;">
          <a href="{% url 'password_reset' %}" style="font-size:12px;color:var(--dc-text-muted);text-decoration:none;">
            ¿Olvidaste tu contraseña?
          </a>
        </div>

      </div>
    </div>

  </body>
</html>
