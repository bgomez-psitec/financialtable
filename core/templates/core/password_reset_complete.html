{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contraseña restablecida — DataContaBL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="{% static 'core/styles.css' %}" />
  </head>
  <body class="dc-login-body">

    <div class="dc-login-card">

      <div class="dc-login-header">
        <div class="dc-login-logo">Data<span>Conta</span>BL</div>
        <div class="dc-login-sub">Contraseña restablecida</div>
      </div>

      <div class="dc-login-body-inner" style="text-align:center;">

        <div style="font-size:48px;color:var(--dc-accent);margin-bottom:16px;">
          <i class="fa-solid fa-circle-check"></i>
        </div>

        <p style="font-size:15px;font-weight:600;margin-bottom:8px;">¡Contraseña actualizada!</p>
        <p style="font-size:13px;color:var(--dc-text-muted);margin-bottom:24px;">
          Tu contraseña ha sido restablecida correctamente. Ya puedes iniciar sesión con tu nueva contraseña.
        </p>

        <a href="{% url 'home' %}" class="dc-login-btn" style="display:inline-block;text-decoration:none;">
          <i class="fa-solid fa-right-to-bracket"></i> Ir al inicio de sesión
        </a>

      </div>
    </div>

  </body>
</html>
