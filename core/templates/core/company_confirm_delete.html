{% extends "core/base.html" %}

{% block title %}Eliminar empresa{% endblock %}

{% block content %}
  <div class="dc-confirm-wrap">
    <div class="dc-card">
      <div class="dc-card__body" style="text-align:center;padding:32px 24px;">
        <div class="dc-confirm-icon">
          <i class="fa-solid fa-building-circle-xmark"></i>
        </div>
        <p class="dc-confirm-title">¿Eliminar empresa?</p>
        <p class="dc-confirm-text">
          Se eliminará permanentemente <strong>{{ company.gd_sociedad }}</strong>.
          Esta acción no se puede deshacer.
        </p>
        <div class="dc-confirm-actions">
          <form method="post">
            {% csrf_token %}
            <button class="btn-danger-solid" type="submit">
              <i class="fa-solid fa-trash"></i> Eliminar
            </button>
          </form>
          <a class="btn-ghost" href="{% url 'companies' %}">Cancelar</a>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
